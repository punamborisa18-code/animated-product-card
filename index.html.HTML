<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ANIMATED PRODUCT</title>
</head>
<body>
<link REL="PRECONNECT"href="https;/fonts.googleapis.com">
<link REL="PRECONNECT"href="https;/fonts.gstatic.com"crossoringin>
<link href="https://fonts.googleapis.com/css2?family=poppins:wgt@400;500;700&display=sawp"rel=styesheet">
<style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:'Poppins',sans-serif;
    }

    body{
      min-height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      background:linear-gradient(135deg,#0f172a,#1e293b);
      padding:20px;
    }

    .card{
      width:320px;
      background:rgba(255,255,255,0.08);
      border:1px solid rgba(255,255,255,0.15);
      backdrop-filter:blur(14px);
      border-radius:25px;
      overflow:hidden;
      box-shadow:0 20px 40px rgba(0,0,0,0.35);
      transition:0.4s ease;
      animation:fadeUp 0.8s ease;
    }

    .card:hover{
      transform:translateY(-12px) scale(1.02);
      box-shadow:0 25px 50px rgba(0,0,0,0.45),
                 0 0 25px rgba(59,130,246,0.35);
    }

    .top{
      height:220px;
      background:linear-gradient(135deg,#3b82f6,#8b5cf6);
      display:flex;
      justify-content:center;
      align-items:center;
      position:relative;
    }

    .circle{
      width:130px;
      height:130px;
      border-radius:50%;
      background:rgba(255,255,255,0.18);
      backdrop-filter:blur(10px);
      display:flex;
      justify-content:center;
      align-items:center;
      font-size:60px;
      color:white;
      transition:0.4s;
    }

    .card:hover .circle{
      transform:rotate(-8deg) scale(1.08);
    }

    .badge{
      position:absolute;
      top:15px;
      left:15px;
      background:#fff;
      color:#111;
      font-size:13px;
      font-weight:600;
      padding:6px 14px;
      border-radius:30px;
    }

    .content{
      padding:25px;
      color:white;
      text-align:center;
    }

    .content h2{
      font-size:28px;
      margin-bottom:8px;
    }

    .content p{
      font-size:14px;
      color:#cbd5e1;
      margin-bottom:18px;
      line-height:1.6;
    }

    .price{
      font-size:28px;
      font-weight:700;
      margin-bottom:18px;
      color:#38bdf8;
    }

    .btn{
      display:inline-block;
      width:100%;
      padding:14px;
      border:none;
      border-radius:40px;
      background:linear-gradient(135deg,#38bdf8,#6366f1);
      color:white;
      font-size:16px;
      font-weight:600;
      cursor:pointer;
      transition:0.3s ease;
      box-shadow:0 10px 25px rgba(59,130,246,0.35);
    }

    .btn:hover{
      transform:scale(1.05);
      box-shadow:0 0 20px rgba(56,189,248,0.7),
                 0 0 35px rgba(99,102,241,0.5);
    }

    @keyframes fadeUp{
      from{
        opacity:0;
        transform:translateY(40px);
      }
      to{
        opacity:1;
        transform:translateY(0);
      }
    }
  </style>
</head>
<body>

  <div class="card">
    <div class="top">
      <div class="badge">New</div>
      <div class="circle">👜</div>
    </div>

    <div class="content">
      <h2>Borisa Bag</h2>
      <p>Stylish premium tote bag with modern design and smooth hover animation.</p>
      <div class="price">₹1,999</div>
      <button class="btn">Buy Now</button>
    </div>
</div>
    <h2></h2>
    <p>BAG</p>
</body>
</html>
